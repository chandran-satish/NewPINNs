# PINN Porous Media Training Configuration

# Data settings
data:
  train_num_samples: 256
  valid_num_samples: 64

# Training settings
training:
  save_dir: 'checkpoints/unet_Jan6'
  read_ckpt: None
  fvm_iterations: 10
  num_epochs: 1000
  batch_size: 1
  Tmax: 100
  enable_progress_bar: False
  enable_model_summary: False
  enable_validation: True
  log_every_n_steps: 1
  accelerator: 'auto'
  strategy: 'ddp'
  precision: '16-mixed'
  num_gpus: 1

# Checkpoint settings
checkpoint:
  filename: 'model_{epoch}'
  save_top_k: 3
  monitor: 'val_loss'
  mode: 'min'
  save_last: True
  every_n_epochs: 1

# Model settings
model:
  type: 'unet'
  learning_rate: 1.0e-4
  
  # UNet specific parameters
  unet_config:
    sample_size: [32, 32]
    in_channels: 1
    out_channels: 1
    init_method: None # Options: kaiming, xavier, orthogonal, normal, zeros, near_zero
    init_gain: 0.02  # Controls how close to zero the initialization will be
    layers_per_block: 2
    block_out_channels: [64, 128, 256]
    norm_num_groups: 8
    down_block_types: ["DownBlock2D", "DownBlock2D", "DownBlock2D"]
    up_block_types: ["UpBlock2D", "UpBlock2D", "UpBlock2D"]
    attention_head_dim: 8
    
    # Normalization parameters
    p_min: 0.0
    p_maxx: 10.0



# Dataloader settings
dataloader:
  num_workers: 1
  pin_memory: true
  persistent_workers: true